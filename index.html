<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="main.css" />
</head>
<body class="aat-liquid-glass">

  <svg id="aat-liquid-glass-svg" width="0" height="0" aria-hidden="true" style="position:fixed;left:-9999px;top:-9999px">
    <defs>
      <filter id="aatLiquidGlassFilter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.004" numOctaves="3" seed="7" result="noise" />
        <feColorMatrix in="noise" type="saturate" values="0" result="noiseGray" />
        <feDisplacementMap in="SourceGraphic" in2="noiseGray" scale="4" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <!-- 侧边栏 -->
  <aside class="sidebar">
    <button class="mode-toggle" id="modeToggle" aria-label="切换深浅色模式">
      <svg class="icon icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
      <svg class="icon icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>

    <div class="sidebar-avatar">
      <img src="a.jpg" alt="头像" />
    </div>

    <nav class="sidebar-nav">
      <a href="#home" class="sidebar-link active">首页</a>
      <a href="#about" class="sidebar-link">关于</a>
      <a href="#projects" class="sidebar-link">项目</a>
      <a href="#contact" class="sidebar-link">联系</a>
    </nav>

    <div class="sidebar-footer">
      <span class="status-dot ok"></span>
      <span class="status-text">Available</span>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="container">
  </main>

  <script src="main.js"></script>
</body>
</html>
